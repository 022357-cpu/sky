<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나의 첫 웹사이트</title>
    <style>
        body {
            background-color: #f0f8ff; /* 연한 파란색 배경 */
            text-align: center; /* 모든 글자를 가운데 정렬 */
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; /* 깔끔한 폰트로 변경 */
            padding-top: 100px; /* 위쪽 여백 주기 */
        }
        h1 {
            color: #2c3e50; /* 제목을 진한 남색으로 */
            font-size: 60px; /* 제목 크기 키우기 */
            margin-bottom: 20px;
        }
        p {
            color: #555555; /* 본문은 부드러운 회색으로 */
            font-size: 24px;
            font-weight: bold; /* 글씨 굵게 */
        }
    </style>
    </head>
<body>
    <h1>2025년에는?</h1>
    <p>여기에서 나의 눈을 키우자?!</p>
</body>
</html>
