<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나의 첫 웹사이트</title>
    <style>
        /* 1. 전체 배경과 폰트 설정 */
        body {
            background-color: #f0f8ff;
            text-align: center;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            padding-top: 80px; 
        }

        /* 2. 메인 제목 꾸미기 */
        h1 {
            color: #2c3e50;
            font-size: 40px;
            margin-bottom: 50px; /* 제목과 블록들 사이의 간격 띄우기 */
        }

        /* 3. 블록들을 담는 큰 상자 (가로로 나란히 정렬) */
        .block-container {
            display: flex; /* 블록들을 가로로 배치하는 마법의 명령어 */
            justify-content: center; /* 화면 가운데로 모으기 */
            gap: 20px; /* 블록과 블록 사이의 간격 */
        }

        /* 4. 개별 연도 블록 디자인 */
        .year-block {
            background-color: white; /* 블록 색상은 깔끔하게 흰색 */
            color: #333333;
            font-size: 28px;
            font-weight: bold;
            padding: 30px 40px; /* 블록 안쪽 여백을 줘서 통통하게 만들기 */
            border-radius: 15px; /* 블록 모서리를 둥글게 깎기 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* 그림자를 줘서 입체감(블록 느낌) 살리기 */
            cursor: pointer; /* 마우스를 올리면 손가락 모양으로 바뀌게 */
            transition: transform 0.2s; /* 움직임 애니메이션 준비 */
        }

        /* 5. 보너스! 블록에 마우스를 올렸을 때 살짝 위로 떠오르는 효과 */
        .year-block:hover {
            transform: translateY(-10px); 
        }
    </style>
</head>
<body>

    <h1>여기에서 나의 눈을 키우자?!</h1>

    <div class="block-container">
        <div class="year-block">2023년</div>
        <div class="year-block">2024년</div>
        <div class="year-block">2025년</div>
    </div>

</body>
</html>
