<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나의 첫 웹사이트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet">

    <style>
        /* 2. 전체 배경과 기본 폰트 설정 (기본은 깔끔하게 유지) */
        body {
            background-color: #f0f8ff;
            text-align: center;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            padding-top: 80px; 
        }

        /* 3. '국제 정세' 뱃지 디자인 - 글자체 변경! */
        .category-badge {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            
            /* [날림체 적용 부분] */
            font-family: 'Nanum Brush Script', cursive; /* 날림체(나눔붓친구) 적용 */
            font-size: 28px; /* 날림체는 좀 더 크게 해야 잘 보여요 */
            font-weight: normal; /* 붓글씨는 자체 굵기가 있어 보통으로 설정 */
            
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* 4. 메인 제목 꾸미기 */
        h1 {
            color: #2c3e50;
            font-size: 40px;
            margin-top: 0;
            margin-bottom: 50px; 
            font-weight: bold; /* 제목은 원래대로 두껍게 */
        }

        /* 5. 블록들을 담는 큰 상자 */
        .block-container {
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }

        /* 6. 개별 연도 블록 디자인 */
        .year-block {
            background-color: white; 
            color: #333333;
            font-size: 28px;
            font-weight: bold;
            padding: 30px 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); 
            cursor: pointer; 
            transition: transform 0.2s; 
        }

        /* 7. 블록 마우스 오버 효과 */
        .year-block:hover {
            transform: translateY(-10px); 
        }
    </style>
</head>
<body>

    <div class="category-badge">       국제 정세      </div>

    <h1>여기에서 나의 눈을 키우자?!</h1>

    <div class="block-container">
        <div class="year-block">2023년</div>
        <div class="year-block">2024년</div>
        <div class="year-block">2025년</div>
    </div>

</body>
</html>

</body>
</html>
