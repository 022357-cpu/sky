<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나의 첫 웹사이트</title>
    <style>
        /* 1. 전체 배경과 폰트 설정 */
        body {
            background-color: #f0f8ff;
            text-align: center;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            padding-top: 80px; 
        }

        /* 2. 새롭게 추가된 '국제 정세' 뱃지 디자인 */
        .category-badge {
            display: inline-block; /* 글자 크기에 맞춰 배경 상자 크기 맞추기 */
            background-color: #3498db; /* 시원한 파란색 배경 */
            color: white; /* 글자는 흰색 */
            padding: 8px 20px; /* 뱃지 안쪽 여백 */
            border-radius: 20px; /* 양 끝을 완전 둥글게 */
            font-size: 100px;
            font-weight: bold;
            margin-bottom: 20px; /* 아래쪽 메인 제목과의 간격 띄우기 */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* 3. 메인 제목 꾸미기 */
        h1 {
            color: #2c3e50;
            font-size: 40px;
            margin-top: 0;
            margin-bottom: 50px; 
        }

        /* 4. 블록들을 담는 큰 상자 */
        .block-container {
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }

        /* 5. 개별 연도 블록 디자인 */
        .year-block {
            background-color: white; 
            color: #333333;
            font-size: 28px;
            font-weight: bold;
            padding: 30px 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); 
            cursor: pointer; 
            transition: transform 0.2s; 
        }

        /* 6. 블록 마우스 오버 효과 */
        .year-block:hover {
            transform: translateY(-10px); 
        }
    </style>
</head>
<body>

    <div class="category-badge">국제 정세</div>

    <h1>여기에서 나의 눈을 키우자?!</h1>

    <div class="block-container">
        <div class="year-block">2023년</div>
        <div class="year-block">2024년</div>
        <div class="year-block">2025년</div>
    </div>

</body>
</html>
